version: 1
sources:
  docs_primary:
    required: true
    enabled: true
    decision_status: decided
    vendor_name: sec_edgar_public
    endpoint_or_connector: "https://www.sec.gov/files/company_tickers.json + https://data.sec.gov/submissions/"
    auth_required: true
    purpose:
      - primary_document_search
      - primary_document_fetch
      - citation_bundle
    auth_envs:
      - SEC_USER_AGENT
    license_scope: external_public
    notes: "SEC EDGAR public endpoints are used. Requests must include a descriptive SEC_USER_AGENT."

  market_primary:
    required: true
    enabled: true
    decision_status: decided
    vendor_name: yahoo_finance_yfinance
    endpoint_or_connector: "yfinance library over Yahoo Finance public endpoints"
    auth_required: false
    purpose:
      - price_snapshot
      - fundamentals
      - share_count
      - fx_rate
      - peer_lookup
    auth_envs: []
    license_scope: external_public
    notes: "Uses public market data via yfinance. Data availability varies by ticker and field."

  research_memory:
    required: false
    enabled: false
    decision_status: deferred
    vendor_name: null
    endpoint_or_connector: null
    auth_required: true
    purpose:
      - internal_memory_search
      - house_report_lookup
    auth_envs:
      - RESEARCH_MEMORY_TOKEN
    license_scope: internal_research
    notes: "Do not enable until access control and audit logging design are approved."
